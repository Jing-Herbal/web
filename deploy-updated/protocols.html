function renderProtocol(p) {
  return `
  <div class="protocol-card" id="${p.id}">
    <div class="protocol-card-header" onclick="toggleProtocol('${p.id}', this)">
      <div>
        <div class="pc-eyebrow">${p.eyebrow}</div>
        <div class="pc-name">${p.name}</div>
        <div class="pc-summary">${p.summary}</div>
        <div class="pc-tags">${p.tags.map(t=>`<span class="tag tag-jade">${t}</span>`).join('')}</div>
        <div class="pc-toggle" id="toggle-${p.id}">Show protocol details ▾</div>
      </div>
      <div class="pc-right">
        <div class="pc-ev-label">Evidence</div>
        <div class="pc-ev-grade" style="color:${p.evColor}">${p.ev}</div>
        <div class="pc-ev-sub">${p.evSub}</div>
      </div>
    </div>
    <div class="protocol-card-body" id="body-${p.id}">
      <div class="pcb-grid">
        <div>
          <div class="herb-row-title">Herbs in stack (${p.herbs.length})</div>
          ${p.herbs.map(h=>`
          <a class="herb-item" href="/herb/${h.id}">
            <div style="display:flex;justify-content:space-between;align-items:start">
              <div>
                <div class="hi-name">${h.name}</div>
                <div class="hi-zh">${h.zh}</div>
              </div>
              <span class="ev-dot ev-${h.ev}" style="margin-top:4px;flex-shrink:0"></span>
            </div>
            <div class="hi-dose">${h.dose}</div>
            <div class="hi-role">${h.role}</div>
          </a>`).join('')}
        </div>
        <div>
          <div class="herb-row-title">Mechanisms</div>
          ${p.mechanisms.map(m=>`<div class="mechanism-item"><strong>${m.title}</strong>${m.body}</div>`).join('')}
        </div>
        <div>
          <div class="herb-row-title">Dosage & timing</div>
          ${p.dosage.map(d=>`<div class="dosage-item"><span class="di-key">${d.k}</span><span class="di-val">${d.v}</span></div>`).join('')}
          ${p.warning?`<div class="warning-box"><strong>Safety note</strong>${p.warning}</div>`:''}
          <a href="/formulary" class="btn-primary" style="display:inline-block;margin-top:1.25rem;font-size:12px;padding:0.6rem 1.25rem">Shop this protocol →</a>
        </div>
      </div>
    </div>
  </div>`;
}

function toggleProtocol(id, header) {
  const body = document.getElementById('body-'+id);
  const toggle = document.getElementById('toggle-'+id);
  const isOpen = body.classList.contains('open');
  body.classList.toggle('open', !isOpen);
  toggle.textContent = isOpen ? 'Show protocol details ▾' : 'Hide details ▴';
}

document.getElementById('protocols-content').innerHTML = PROTOCOLS.map(renderProtocol).join('');

// Auto-open if linked directly via hash
if (location.hash) {
  const id = location.hash.slice(1);
  const body = document.getElementById('body-'+id);
  const toggle = document.getElementById('toggle-'+id);
  if (body) {
    body.classList.add('open');
    if (toggle) toggle.textContent = 'Hide details ▴';
  }
}
</script>
</body>
