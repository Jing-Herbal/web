(function renderHerbPhoto() {
  const wikiTitle = WIKI_TITLES[herbId];
  const mount = document.getElementById('herb-photo-root');
  if (!wikiTitle || !mount) return;

  // Show skeleton immediately
  mount.innerHTML = `
  <div class="herb-photo-section">
    <div class="herb-photo-inner">
      <div class="herb-photo-wrap" id="herb-photo-wrap">
        <div class="herb-photo-skeleton" id="photo-skeleton"></div>
      </div>
    </div>
  </div>`;

  // Fetch Wikipedia article summary — returns thumbnail.source URL
  // This is the same image Wikipedia uses for the article, always correct
  const apiUrl = `https://en.wikipedia.org/api/rest_v1/page/summary/${encodeURIComponent(wikiTitle)}`;
  fetch(apiUrl)
    .then(r => r.json())
    .then(d => {
      const wrap = document.getElementById('herb-photo-wrap');
      if (!wrap) return;

      const img = d.originalimage || d.thumbnail;
      if (!img || !img.source) {
        // No image found — hide the section entirely
        wrap.closest('.herb-photo-section').style.display = 'none';
        return;
      }

      // Use original image capped at 1200px via thumbnail API
      const imgSrc = img.source;
      const wikiUrl = `https://en.wikipedia.org/wiki/${encodeURIComponent(wikiTitle)}`;
      // Credit: get from page content description
      const credit = d.description || 'Wikipedia';

      wrap.innerHTML = `
        <img
          class="herb-photo-img loading"
          src="${imgSrc}"
          alt="${herb.name} (${herb.zh}) — ${herb.latin}"
          loading="lazy"
          onerror="this.closest('.herb-photo-section').style.display='none'"
          onload="this.classList.remove('loading');this.classList.add('loaded')"
        >
        <div class="herb-photo-caption">
          <span class="herb-photo-credit">
            Photo via <a href="${wikiUrl}" target="_blank" rel="noopener">Wikipedia</a>
            · Wikimedia Commons · CC BY-SA
          </span>
          <span class="herb-photo-badge">Wild / cultivated specimen</span>
        </div>`;
    })
    .catch(() => {
      // Network error — hide silently
      const sec = document.querySelector('.herb-photo-section');
      if (sec) sec.style.display = 'none';
    });
})();

function toggleOC(header) {
  const body = header.nextElementSibling;
  const chevron = header.querySelector('span:last-child');

  body.classList.toggle('open',!isOpen);
